#Define input 
GRUC GRUcoreSoapServerHost:GRUcoreSoapServerPort GRU INPUT NARVAL NarvalActorWatcherHost NarvalActorWatcherPort 
#Define BufferSize
GRUC GRUcoreSoapServerHost:GRUcoreSoapServerPort GRU INPUT BUFFERSIZE BufferSizeToSet
#Define User code
GRUC GRUcoreSoapServerHost:GRUcoreSoapServerPort GRU INITACQ GUSER
#Init event with experiment name 
GRUC GRUcoreSoapServerHost:GRUcoreSoapServerPort GRU INITEVENT ExperimentName 
#Start all Raw Spectra
GRUC GRUcoreSoapServerHost:GRUcoreSoapServerPort GRU SPECTRA ALL
#Init GUser
GRUC GRUcoreSoapServerHost:GRUcoreSoapServerPort GRU INITRUNS 1
